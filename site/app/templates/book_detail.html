{% block sidebar_left %}

{% if book.book_description %}
<div class="sidebar-description-wrap">
  <p class="sidebar-description sidebar-description--collapsed" id="book-desc">
    {{ book.book_description }}
  </p>
  <button class="desc-toggle" id="desc-toggle">...</button>
</div>
{% endif %}

<div class="sidebar-meta">
  <p><strong>Published:</strong> {{ book.book_publication_year or 'Unknown' }}</p>
  <p><strong>Pages:</strong> {{ book.book_page_count or 'Unknown' }}</p>
  {% if book.book_rating %}
  <p><strong>Rating:</strong> {{ book.book_rating }}/5</p>
  {% endif %}
</div>

<script>
(function() {
  var desc = document.getElementById('book-desc');
  var btn = document.getElementById('desc-toggle');
  if (!desc || !btn) return;

  btn.onclick = function() {
    desc.classList.toggle('sidebar-description--collapsed');
    btn.textContent = desc.classList.contains('sidebar-description--collapsed') ? '...' : 'less';
  };
})();
</script>

{% endblock %}
